<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopee Link Converter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #fff;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 420px;

      background: #0f0f0f;
      padding: 30px;
      border-radius: 20px;

      border: 5px solid #5eff5e;
      box-shadow: 0 0 15px #5eff5e,
                  0 0 30px rgba(0,255,100,0.4);
      
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .convert-btn {
      background: #00e676;
      color: #000;
      font-weight: bold;
    }

    .copy-btn {
      background: #00bcd4;
      color: #000;
      margin-top: 15px;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
      word-break: break-all;
      color: #ccc;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🔥 Shortlink Shopee</h2>

  <input type="text" id="link" placeholder="Paste link Shopee">

  <select id="domain">
    <option value="https://cdn2.videy.team">cdn2.videy.team</option>
    <option value="https://cdn2videy.cc">cdn2videy.cc</option>
  </select>

  <button class="convert-btn" onclick="convert()">Convert</button>

  <div id="result"></div>

</div>

<script>
// 🔥 redirect handler (.mp4 → Shopee)
const path = window.location.pathname;
const match = path.match(/\/([a-zA-Z0-9]+)\.mp4/);

if (match) {
  const code = match[1];
  window.location.href = "https://s.shopee.co.id/" + code;
}

// 🔥 convert function
function convert() {
  const link = document.getElementById("link").value;
  const domain = document.getElementById("domain").value;

  if (!link.includes("s.shopee.co.id")) {
    alert("Harus link Shopee!");
    return;
  }

  const code = link.split("/").pop();
  const result = domain + "/" + code + ".mp4";

  document.getElementById("result").innerHTML = `
    <p id="short">${result}</p>
    <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
  `;
}

// 🔥 copy function
function copyLink() {
  const text = document.getElementById("short").innerText;

  navigator.clipboard.writeText(text).then(() => {
    document.querySelector(".copy-btn").innerText = "✅ Copied!";
  });
}
</script>

</body>
</html>
