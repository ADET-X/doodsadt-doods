<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shopee Link Converter</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    input, select {
      padding: 10px;
      width: 320px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00ff99;
      cursor: pointer;
      margin: 5px;
    }
    .copy-btn {
      background: #00ccff;
    }
  </style>
</head>
<body>

<h2>🔥 Shopee Link Converter</h2>

<input type="text" id="link" placeholder="Paste link Shopee">
<br>

<select id="domain">
  <option value="https://cdn2.videy.team">cdn2.videy.team</option>
  <option value="https://cdn2videy.cc">cdn2videy.cc</option>
</select>

<br><br>
<button onclick="convert()">Convert</button>

<div id="result"></div>

<script>
// redirect handler (biar .mp4 jalan)
const path = window.location.pathname;
const match = path.match(/\/([a-zA-Z0-9]+)\.mp4/);

if (match) {
  const code = match[1];
  window.location.href = "https://s.shopee.co.id/" + code;
}

// convert
function convert() {
  const link = document.getElementById("link").value;
  const domain = document.getElementById("domain").value;

  if (!link.includes("s.shopee.co.id")) {
    alert("Harus link Shopee!");
    return;
  }

  const code = link.split("/").pop();
  const result = domain + "/" + code + ".mp4";

  document.getElementById("result").innerHTML = `
    <p id="short">${result}</p>
    <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
  `;
}

// copy function
function copyLink() {
  const text = document.getElementById("short").innerText;

  navigator.clipboard.writeText(text).then(() => {
    alert("✅ Link berhasil di-copy!");
  });
}
</script>

</body>
</html>
