<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shopee Link Converter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: #fff;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin: 8px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #00ff99;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .copy-btn {
      background: #00ccff;
      margin-top: 10px;
    }

    #result {
      margin-top: 20px;
      word-break: break-all;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🔥 Shopee Link Converter</h2>

  <input type="text" id="link" placeholder="Paste link Shopee">

  <select id="domain">
    <option value="https://cdn2.videy.team">cdn2.videy.team</option>
    <option value="https://cdn2videy.cc">cdn2videy.cc</option>
  </select>

  <button onclick="convert()">Convert</button>

  <div id="result"></div>

</div>

<script>
// redirect handler
const path = window.location.pathname;
const match = path.match(/\/([a-zA-Z0-9]+)\.mp4/);

if (match) {
  const code = match[1];
  window.location.href = "https://s.shopee.co.id/" + code;
}

// convert
function convert() {
  const link = document.getElementById("link").value;
  const domain = document.getElementById("domain").value;

  if (!link.includes("s.shopee.co.id")) {
    alert("Harus link Shopee!");
    return;
  }

  const code = link.split("/").pop();
  const result = domain + "/" + code + ".mp4";

  document.getElementById("result").innerHTML = `
    <p id="short">${result}</p>
    <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
  `;
}

// copy
function copyLink() {
  const text = document.getElementById("short").innerText;

  navigator.clipboard.writeText(text).then(() => {
    document.querySelector(".copy-btn").innerText = "✅ Copied!";
  });
}
</script>

</body>
</html>
